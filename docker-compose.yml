version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: costguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: costguard
      POSTGRES_USER: costguard
      POSTGRES_PASSWORD: costguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U costguard -d costguard"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.0
    container_name: costguard-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path=/migrations",
        "-database", "postgres://costguard:costguard@postgres:5432/costguard?sslmode=disable",
        "up"
      ]
    restart: "no"

  costguard:
    build: .
    container_name: costguard
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    env_file:
      - .env

volumes:
  postgres_data: