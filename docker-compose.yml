version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: costguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: costguard
      POSTGRES_USER: costguard
      POSTGRES_PASSWORD: costguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  costguard:
    build: .
    container_name: costguard
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    env_file:
      - .env

volumes:
  postgres_data: